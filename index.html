<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Sistemas - SECTI/BA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="../assets/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
    <link rel="shortcut icon" href="../assets/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="HUB-SECTI" />
    <link rel="manifest" href="assets/site.webmanifest" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="min-h-screen flex flex-col bg-slate-50 antialiased text-slate-800">

    <header id="main-header"></header>

    <main class="container mx-auto px-6 py-12 flex-grow">
        <div class="text-center mb-16 flex flex-col items-center">

            <span
                class="inline-flex items-center gap-2 py-1.5 px-4 rounded-full bg-white border border-slate-200 text-slate-600 text-[10px] sm:text-xs font-bold uppercase tracking-[0.15em] mb-6 shadow-sm">
                <i class="fas fa-network-wired text-blue-500"></i>
                Hub de Serviços
            </span>

            <h1
                class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-slate-900 via-slate-800 to-slate-500 tracking-tight mb-6 pb-2">
                Sistemas Integrados
            </h1>

            <p class="text-slate-500 md:text-lg max-w-2xl mx-auto font-medium leading-relaxed">
                Plataforma central de acesso rápido aos portais, painéis e ferramentas de gestão da <strong
                    class="text-slate-700 font-semibold">Secretaria de Ciência, Tecnologia e Inovação</strong>.
            </p>
        </div>
        <div id="systems-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-12"></div>
    </main>

    <footer id="main-footer" class="py-10 text-center border-t border-slate-300 bg-slate-200/50"></footer>

    <script src="js/app.js" defer></script>
</body>

</html>
