<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Sistemas - SECTI/BA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="../assets/images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
    <link rel="shortcut icon" href="../assets/images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="HUB-SECTI" />
    <link rel="manifest" href="../assets/images/site.webmanifest" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="min-h-screen flex flex-col">

    <header id="main-header"></header>

    <main class="container mx-auto px-6 py-12 flex-grow">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-3">Sistemas</h2>
            <p class="text-slate-600 mt-2 text-base max-w-md mx-auto font-medium leading-relaxed">Acesso rápido aos portais da Secretaria de Ciência,
                Tecnologia e Inovação.</p>
        </div>
        <div id="systems-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-12"></div>
    </main>

    <footer id="main-footer" class="py-10 text-center border-t border-slate-300 bg-slate-200/50"></footer>

    <script src="js/app.js" defer></script>
</body>

</html>
